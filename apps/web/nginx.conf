# Nginx config for the Tavern web image.
#
# Serves the Vite production build at /. SPA fallback rewrites any
# unmatched path to /index.html so TanStack Router can take over client-side.
# Static assets in /assets/ ship with long-lived immutable cache headers
# (Vite already content-hashes their filenames). /api/* and /gateway are
# proxied to the api service inside the docker network so the browser only
# ever talks to one origin (no CORS).

# `api` resolves via the docker-compose network. Buffer + timeouts tuned for
# WebSocket gateway + slow upload completions.

server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # Larger uploads land via the upload presign flow but small POST bodies
    # still need headroom for big message edits / handouts.
    client_max_body_size 25m;

    # INF-015: compress text-y assets on the fly. The static-asset location
    # below caches the compressed output via `expires 1y immutable`, so this
    # is paid once per asset. Brotli would be better but isn't in the stock
    # nginx:alpine image; gzip is universally supported.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json
               application/xml application/wasm font/woff font/woff2
               image/svg+xml;

    # REST / JSON API.
    location /api/ {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket gateway — needs Upgrade/Connection headers + long read timeout.
    location /gateway {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Content-hashed assets — safe to cache forever.
    # The X-Content-Type-Options repeat is the nginx add_header inheritance
    # gotcha (see the /index.html block below for the long version): adding
    # *any* add_header here drops every parent add_header, so nosniff has to
    # be repeated or .js / .css assets ship without it.
    location /assets/ {
        access_log off;
        expires    1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options nosniff;
        try_files  $uri =404;
    }

    # Service worker / manifest / other root-level static files — short cache.
    # Same nginx inheritance gotcha as /assets/.
    location ~* \.(?:webmanifest|json)$ {
        access_log off;
        expires    1h;
        add_header Cache-Control "public, max-age=3600";
        add_header X-Content-Type-Options nosniff;
        try_files  $uri =404;
    }

    # SPA fallback — every other path resolves to index.html so the router
    # can pick it up. index.html itself stays no-cache so deploys are picked
    # up on the next page load.
    location / {
        try_files  $uri $uri/ /index.html;
    }

    # nginx gotcha: any `add_header` in an inner block COMPLETELY OVERRIDES
    # the parent block's `add_header` directives (no inheritance). The
    # security headers below must therefore be repeated here, otherwise the
    # SPA's entry document (every navigation lands here via the try_files
    # internal redirect from `location /`) ships without them — and Voice
    # Hall throws "microphone is not allowed in this document" because the
    # Permissions-Policy never reaches the browser when this container is
    # the public edge (no Traefik in front).
    location = /index.html {
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header Referrer-Policy "strict-origin-when-cross-origin";
        add_header Permissions-Policy "camera=(self), microphone=(self), display-capture=(self), geolocation=(), payment=()";
        add_header Cache-Control "no-store";
    }

    # Basic hardening.
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    # SEC-025: deny powerful APIs the SPA doesn't use. Camera, microphone, and
    # display-capture are allow-listed to (self) — the voice room calls
    # getUserMedia / getDisplayMedia from the top-level SPA (LiveKit's JS
    # client, not an iframe), so the top-level Permissions-Policy must allow
    # them. Setting them to () would make every voice-join throw
    # "Permission denied" client-side regardless of the user's role. Keep
    # the values in sync with the `location = /index.html` block above.
    add_header Permissions-Policy "camera=(self), microphone=(self), display-capture=(self), geolocation=(), payment=()";
    # SEC-016: in production, HSTS + CSP are owned by Traefik (which terminates
    # TLS — HSTS without TLS is harmful). When this container is the public
    # edge (no reverse proxy), uncomment the two lines below. The CSP value
    # mirrors the production-hardening doc's "self-only, plus the API origin
    # and LiveKit signal endpoint" recommendation; adjust the LiveKit host to
    # match LIVEKIT_URL.
    #
    # img-src includes `https:` so federated user avatars / Tavern icons served
    # by peer instances over HTTPS render (follow-ups #7/#12). Peer hosts are
    # dynamic, so they can't be enumerated as an explicit allowlist. Whoever
    # owns the production CSP (Traefik) must apply the same img-src allowance.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https:; media-src 'self' blob:; connect-src 'self' wss: https:; frame-ancestors 'none'; base-uri 'self'";

    # Health probe endpoint for docker-compose. The X-Content-Type-Options
    # repeat is the nginx add_header inheritance gotcha — adding Content-Type
    # below drops every parent add_header, so nosniff has to be repeated.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
        add_header X-Content-Type-Options nosniff;
    }
}
