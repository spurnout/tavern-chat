# LiveKit dev config for Tavern.
# For production, generate fresh keys, restrict CORS, and put the signal port
# behind TLS via Traefik (see infra/traefik/livekit.yml example).
#
# Generate strong keys with:
#   docker run --rm livekit/livekit-cli generate-keys

port: 7880
bind_addresses:
  - 0.0.0.0

rtc:
  tcp_port: 7881
  # INF-005: single-UDP-port mode so the compose file only needs to expose
  # 7882/udp (matches the production-hardening doc's "open UDP 7882" guidance).
  # Single port supports up to ~100 simultaneous participants, comfortably
  # above the room cap below. Switch back to a port range only if you need
  # to scale beyond that — and remember to expose the full range in compose.
  udp_port: 7882
  use_external_ip: false

keys:
  # devkey -> devsecret-change-me. ROTATE FOR ANY DEPLOYMENT.
  devkey: devsecret-change-me

logging:
  level: info
  json: false

room:
  enabled_codecs:
    - mime: audio/opus
    - mime: video/vp8
    - mime: video/h264
  empty_timeout: 300       # close room 5 min after last participant leaves
  max_participants: 50

turn:
  enabled: false           # enable + configure TLS for prod
