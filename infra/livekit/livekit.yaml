# LiveKit dev config for Tavern.
# For production, generate fresh keys, restrict CORS, and put the signal port
# behind TLS via Traefik (see infra/traefik/livekit.yml example).
#
# Generate strong keys with:
#   docker run --rm livekit/livekit-cli generate-keys

port: 7880
bind_addresses:
  - 0.0.0.0

rtc:
  tcp_port: 7881
  # INF-005: single-UDP-port mode so the compose file only needs to expose
  # 7882/udp (matches the production-hardening doc's "open UDP 7882" guidance).
  # Single port supports up to ~100 simultaneous participants, comfortably
  # above the room cap below. Switch back to a port range only if you need
  # to scale beyond that — and remember to expose the full range in compose.
  udp_port: 7882
  use_external_ip: false
  # INF-008: advertise 127.0.0.1 in ICE candidates for local Docker dev.
  # The browser and the LiveKit container both live on the same host, but
  # the container's own bind IP (172.18.0.4 on the Docker bridge) is not
  # reachable from the browser, and the STUN-discovered srflx address fails
  # hairpin NAT on most home routers — every candidate pair lands in state
  # "failed" and the session aborts after the connect handshake.
  # The compose file already forwards `7882:7882/udp` (and `7881` for TCP
  # fallback), so 127.0.0.1 is the routable advertised address for a
  # browser on the same host. For LAN or production deployments, override
  # to the host's LAN IP or set `use_external_ip: true` with TURN enabled.
  node_ip: 127.0.0.1

keys:
  # devkey -> devsecret-change-me.
  #
  # ROTATE BEFORE EXPOSING THIS INSTANCE TO THE PUBLIC INTERNET — these
  # values are public in the repo, so anyone could self-sign LiveKit JWTs
  # against an un-rotated deployment.
  # Generate fresh ones with: docker run --rm livekit/livekit-cli generate-keys
  # Then update *both* this file and the matching env vars (LIVEKIT_API_KEY,
  # LIVEKIT_API_SECRET) — the API logs a loud error in production if either
  # side still has the placeholder value.
  devkey: devsecret-change-me

logging:
  level: info
  json: false

room:
  enabled_codecs:
    - mime: audio/opus
    - mime: video/vp8
    - mime: video/h264
  empty_timeout: 300       # close room 5 min after last participant leaves
  max_participants: 50

turn:
  enabled: false           # enable + configure TLS for prod
