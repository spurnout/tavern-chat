# Tavern — local development stack
#
# Bring up (infra only):     pnpm docker:up
# Bring up (infra + apps):   pnpm docker:up:full
# Tear down:                 pnpm docker:down
# Tail logs:                 pnpm docker:logs
#
# All services bind only to 127.0.0.1 to keep dev environments off the LAN.
#
# The api/worker/web/migrate services live behind the `apps` profile so the
# default `pnpm docker:up` keeps producing the "infra-only" inner-loop that
# pairs with `pnpm dev` on the host. Adding `--profile apps` (via
# `pnpm docker:up:full`) brings the apps up in containers — what you'd run in
# production / on a self-hosted box.

services:
  postgres:
    image: postgres:16-alpine
    container_name: tavern-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tavern}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tavern-dev}
      POSTGRES_DB: ${POSTGRES_DB:-tavern}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - tavern_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tavern} -d ${POSTGRES_DB:-tavern}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tavern-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - tavern_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Garage — S3-compatible object store (AGPL-3.0, by Deuxfleurs).
  # Replaces MinIO. https://garagehq.deuxfleurs.fr/
  # Server config lives in infra/garage/garage.toml — materialized from
  # garage.toml.example by `pnpm garage:config` (chained off `pnpm docker:up`).
  # The real file is git-ignored; each machine gets its own dev secrets.
  garage:
    image: dxflrs/garage:v2.3.0
    container_name: tavern-garage
    restart: unless-stopped
    volumes:
      - ../garage/garage.toml:/etc/garage.toml:ro
      - tavern_garage_meta:/var/lib/garage/meta
      - tavern_garage_data:/var/lib/garage/data
    ports:
      - "127.0.0.1:9000:3900"   # S3 API — kept on host port 9000 to match S3_ENDPOINT
      - "127.0.0.1:9001:3902"   # S3 web (anonymous reads via website-mode if enabled)
      - "127.0.0.1:3903:3903"   # admin API (used by the bootstrap container)
    healthcheck:
      # The dxflrs/garage image is distroless-ish — no wget/curl/nc. The
      # `garage` binary itself can talk to its own admin/RPC, and exits 0
      # once the daemon is accepting connections.
      test: ["CMD", "/garage", "status"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 5s

  # No bootstrap sidecar: the dxflrs/garage image is distroless (no shell), so
  # one-time setup happens from the host via `pnpm garage:bootstrap`, which
  # runs `docker exec tavern-garage /garage ...` to apply layout, import the
  # dev key, create buckets, and grant access. The `pnpm docker:up*` scripts
  # chain that step automatically (it's idempotent), so operators using the
  # npm scripts get bootstrap for free; only the raw `docker compose up -d`
  # path needs to invoke it manually.

  clamav:
    image: clamav/clamav:stable
    container_name: tavern-clamav
    restart: unless-stopped
    ports:
      - "127.0.0.1:3310:3310"
    volumes:
      - tavern_clamav_db:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "echo PING | nc -w 2 localhost 3310 | grep -q PONG"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  # ===========================================================================
  # Apps — gated behind the `apps` profile so the default `pnpm docker:up`
  # stays infra-only.
  # ===========================================================================
  #
  # All four services load their base config from the workspace-root .env
  # (mounted via env_file). Service-DNS hostnames are then overridden inline
  # so DATABASE_URL/REDIS_URL/S3_ENDPOINT/CLAMAV_HOST point at the compose
  # services instead of localhost.

  migrate:
    profiles: ["apps"]
    container_name: tavern-migrate
    image: tavern-migrate:latest
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
      # Use the builder stage so we have the prisma CLI + migrations dir.
      # The leaner `runtime` stage strips devDependencies which removes prisma.
      target: builder
    restart: "no"
    env_file:
      - ../../.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-tavern}:${POSTGRES_PASSWORD:-tavern-dev}@postgres:5432/${POSTGRES_DB:-tavern}
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app/packages/db
    # One-shot: run pending migrations then exit. The api/worker depend on
    # this completing successfully before starting.
    command: ["pnpm", "exec", "prisma", "migrate", "deploy"]

  api:
    profiles: ["apps"]
    container_name: tavern-api
    image: tavern-api:latest
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3001"
      DATABASE_URL: postgresql://${POSTGRES_USER:-tavern}:${POSTGRES_PASSWORD:-tavern-dev}@postgres:5432/${POSTGRES_DB:-tavern}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://garage:3900
      CLAMAV_HOST: clamav
      # When the apps run in containers, the browser reaches /api/* via the
      # web nginx proxy on :3030 — so presigned attachment URLs are routed
      # back through there. Native dev keeps the legacy localhost:3001.
      PUBLIC_BASE_URL: http://localhost:3030
      ALLOWED_ORIGINS: http://localhost:3030,http://localhost:3001
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # INF-007: wait for garage's own healthcheck rather than just process
      # start — uploads on cold boot were racing against garage finishing
      # layout assignment and returning 503 to presigns.
      garage:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 15s

  worker:
    profiles: ["apps"]
    container_name: tavern-worker
    image: tavern-worker:latest
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    # INF-006: only restart on failure. The worker now stays alive (idle) when
    # REDIS_URL is unset, so a clean exit only happens during graceful shutdown
    # — restarting that would loop. On-failure preserves crash recovery without
    # the restart-loop pathology.
    restart: on-failure
    env_file:
      - ../../.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-tavern}:${POSTGRES_PASSWORD:-tavern-dev}@postgres:5432/${POSTGRES_DB:-tavern}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://garage:3900
      CLAMAV_HOST: clamav
      API_BASE_URL: http://api:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      garage:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    profiles: ["apps"]
    container_name: tavern-web
    image: tavern-web:latest
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3030:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3

  # LiveKit — enabled via the `livekit` profile.
  # Requires:    docker compose --profile livekit up -d
  # Phase 3 wires the API to issue tokens for this service.
  livekit:
    image: livekit/livekit-server:latest
    container_name: tavern-livekit
    profiles: ["livekit"]
    restart: unless-stopped
    command: ["--config", "/etc/livekit.yaml"]
    ports:
      - "127.0.0.1:7880:7880"   # signal/HTTP
      - "127.0.0.1:7881:7881"   # TCP
      - "7882:7882/udp"         # TURN/UDP — must be reachable from clients
    volumes:
      - ../livekit/livekit.yaml:/etc/livekit.yaml:ro

volumes:
  tavern_postgres:
  tavern_redis:
  tavern_garage_meta:
  tavern_garage_data:
  tavern_clamav_db:
