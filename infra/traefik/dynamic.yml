# Example Traefik dynamic config for Tavern.
# Adjust hostnames + service URLs to match your deployment.

http:
  routers:
    tavern-web:
      rule: "Host(`tavern.example.com`)"
      entryPoints: ["websecure"]
      service: tavern-web
      middlewares: ["tavern-security-headers"]
      tls:
        certResolver: letsencrypt

    tavern-api:
      rule: "Host(`tavern.example.com`) && PathPrefix(`/api`)"
      entryPoints: ["websecure"]
      service: tavern-api
      middlewares: ["tavern-security-headers"]
      tls:
        certResolver: letsencrypt

    tavern-gateway:
      rule: "Host(`tavern.example.com`) && PathPrefix(`/gateway`)"
      entryPoints: ["websecure"]
      service: tavern-api
      middlewares: ["tavern-security-headers"]
      tls:
        certResolver: letsencrypt

  # INF-014: security headers applied to every Tavern router. Mirrors the
  # production-hardening checklist (HSTS + nosniff + frame-deny + referrer
  # policy + Permissions-Policy). CSP is left for the upstream nginx because
  # Traefik's middleware doesn't easily express the dynamic LiveKit origin
  # the SPA needs in `connect-src`.
  middlewares:
    tavern-security-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: false
        contentTypeNosniff: true
        frameDeny: true
        referrerPolicy: "strict-origin-when-cross-origin"
        # Camera / microphone / display-capture must be (self), not (), because
        # the voice room calls getUserMedia / getDisplayMedia from the top-level
        # SPA (LiveKit JS client, not an iframe). An empty allowlist makes the
        # browser block the call with "Permission denied" before LiveKit ever
        # gets the mic stream. Keep this consistent with apps/web/nginx.conf.
        permissionsPolicy: "camera=(self), microphone=(self), display-capture=(self), geolocation=(), payment=()"

  services:
    tavern-web:
      loadBalancer:
        servers:
          # apps/web ships as nginx (Dockerfile FROM nginx:alpine), which
          # listens on the default HTTP port 80. Don't change this to 3000 —
          # that's the dev Vite port, not the container port.
          - url: "http://tavern-web:80"
    tavern-api:
      loadBalancer:
        servers:
          - url: "http://tavern-api:3001"
